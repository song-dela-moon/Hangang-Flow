apiVersion: apps/v1
kind: Deployment
metadata:
  name: market-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: market-service
  template:
    metadata:
      labels:
        app: market-service
    spec:
      containers:
      - name: market-service
        image: songdelamoon/market-service:latest
        ports:
        - containerPort: 9090
---
apiVersion: v1
kind: Service
metadata:
  name: market-service
spec:
  selector:
    app: market-service
  ports:
  - port: 9090
    targetPort: 9090
